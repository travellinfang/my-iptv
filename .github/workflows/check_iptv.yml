name: IPTV 直播源自动检测

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

# 添加权限声明，解决 exit code 128
permissions:
  contents: write

jobs:
  check-iptv:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 升级到 v5，解决 Node.js 20 废弃警告
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行检测
        run: python iptv_checker.py

      - name: 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --cached --quiet || (
            git commit -m "🔄 自动更新 $(date +'%Y-%m-%d %H:%M')"
            git push
          )
